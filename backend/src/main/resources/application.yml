spring:
  application:
    name: CineBook Backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cinebook_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:cinebook-super-secret-key-must-be-at-least-256-bits-long-for-hs256}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION:86400000}      # 24 hours
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}    # 7 days

  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:DEMO0001}           # Replace with sandbox TmnCode from sandbox.vnpayment.vn
    hash-secret: ${VNPAY_HASH_SECRET:RAOEXHYVSDDIIENYWSLDIIZTANXUXZFJ}  # Replace with sandbox HashSecret
    pay-url: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
    return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/payments/vnpay-return}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.cinebook: INFO
    org.springframework.security: WARN
